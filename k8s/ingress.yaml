apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: catalog-api
  labels:
    app: catalog-api
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: catalog-api
                port:
                  number: 5063