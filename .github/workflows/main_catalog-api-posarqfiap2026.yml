name: Build and Deploy Catalog API to AKS

on:
  push:
    branches:
      - feature/fase4
    paths:
      - 'src/**'
      - 'Dockerfile'
      - 'k8s/**'
      - '.github/workflows/main_catalog-api-posarqfiap2026.yml'
  workflow_dispatch:

env:
  REGISTRY: ${{ secrets.ACR_LOGIN_SERVER }}
  IMAGE_NAME: ${{ secrets.IMAGE_NAME }}
  AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
  ACR_NAME: ${{ secrets.ACR_NAME }}
  AKS_CLUSTER_NAME: ${{ secrets.AKS_CLUSTER_NAME }}
  AKS_RESOURCE_GROUP: ${{ secrets.AKS_RESOURCE_GROUP }}
  AKS_NAMESPACE: ${{ secrets.AKS_NAMESPACE }}
  KEYVAULT_NAME: ${{ secrets.KEYVAULT_NAME != '' && secrets.KEYVAULT_NAME || vars.KEYVAULT_NAME != '' && vars.KEYVAULT_NAME || 'kvcloudgamesfiap' }}

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.x'

      - name: Restore dependencies
        run: dotnet restore ./src/Catalog.Api/Catalog.Api.csproj
        working-directory: .

      - name: Build
        run: dotnet build ./src/Catalog.Api/Catalog.Api.csproj --configuration Release --no-restore
        working-directory: .

      - name: Run tests
        run: dotnet test ./tests/Catalog.Tests/Catalog.Tests.csproj --configuration Release --no-build --verbosity normal
        working-directory: .
        continue-on-error: true

  build-and-push:
    name: Build and Push to ACR
    needs: build-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate required Azure secrets
        run: |
          test -n "${{ secrets.AZURE_CLIENT_ID }}" || (echo "Missing secret: AZURE_CLIENT_ID" && exit 1)
          test -n "${{ secrets.AZURE_CLIENT_SECRET }}" || (echo "Missing secret: AZURE_CLIENT_SECRET" && exit 1)
          test -n "${{ secrets.AZURE_TENANT_ID }}" || (echo "Missing secret: AZURE_TENANT_ID" && exit 1)
          test -n "${{ secrets.AZURE_SUBSCRIPTION_ID }}" || (echo "Missing secret: AZURE_SUBSCRIPTION_ID" && exit 1)

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}"}'

      - name: Get ACR login credentials
        run: |
          az acr login --name ${{ env.ACR_NAME }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            -f Dockerfile \
            --push \
            .

  deploy:
    name: Deploy to AKS
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate required Azure secrets
        run: |
          test -n "${{ secrets.AZURE_CLIENT_ID }}" || (echo "Missing secret: AZURE_CLIENT_ID" && exit 1)
          test -n "${{ secrets.AZURE_CLIENT_SECRET }}" || (echo "Missing secret: AZURE_CLIENT_SECRET" && exit 1)
          test -n "${{ secrets.AZURE_TENANT_ID }}" || (echo "Missing secret: AZURE_TENANT_ID" && exit 1)
          test -n "${{ secrets.AZURE_SUBSCRIPTION_ID }}" || (echo "Missing secret: AZURE_SUBSCRIPTION_ID" && exit 1)

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}"}'

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group ${{ env.AKS_RESOURCE_GROUP }} \
            --name ${{ env.AKS_CLUSTER_NAME }} \
            --overwrite-existing

      - name: Check if namespace exists
        run: |
          kubectl get namespace ${{ env.AKS_NAMESPACE }} || \
          kubectl create namespace ${{ env.AKS_NAMESPACE }}

      - name: Configure Workload Identity federated credential
        run: |
          OIDC_ISSUER=$(az aks show \
            --resource-group ${{ env.AKS_RESOURCE_GROUP }} \
            --name ${{ env.AKS_CLUSTER_NAME }} \
            --query "oidcIssuerProfile.issuerUrl" -o tsv)

          echo "AKS OIDC Issuer: $OIDC_ISSUER"

          EXISTING=$(az ad app federated-credential list \
            --id ${{ secrets.AZURE_CLIENT_ID }} \
            --query "[?name=='catalog-api-aks-federated'].name" -o tsv 2>/dev/null || echo "")

          if [ -z "$EXISTING" ]; then
            echo "Creating federated identity credential..."
            az ad app federated-credential create \
              --id ${{ secrets.AZURE_CLIENT_ID }} \
              --parameters "{
                \"name\": \"catalog-api-aks-federated\",
                \"issuer\": \"${OIDC_ISSUER}\",
                \"subject\": \"system:serviceaccount:${{ env.AKS_NAMESPACE }}:catalog-api\",
                \"audiences\": [\"api://AzureADTokenExchange\"]
              }"
            echo "Federated identity credential created."
          else
            echo "Federated identity credential already exists, skipping."
          fi

      - name: Render SecretProviderClass
        run: |
          mkdir -p .rendered
          sed \
            -e "s|__KEYVAULT_NAME__|${{ env.KEYVAULT_NAME }}|g" \
            -e "s|__AZURE_TENANT_ID__|${{ env.AZURE_TENANT_ID }}|g" \
            -e "s|__AZURE_CLIENT_ID__|${{ secrets.AZURE_CLIENT_ID }}|g" \
            k8s/secretproviderclass.yaml > .rendered/secretproviderclass.yaml

      - name: Render ServiceAccount
        run: |
          mkdir -p .rendered
          sed \
            -e "s|__AZURE_CLIENT_ID__|${{ secrets.AZURE_CLIENT_ID }}|g" \
            k8s/serviceaccount.yaml > .rendered/serviceaccount.yaml

      - name: Create ACR pull secret
        run: |
          kubectl create secret docker-registry acr-credentials \
            --docker-server=${{ env.REGISTRY }} \
            --docker-username=00000000-0000-0000-0000-000000000000 \
            --docker-password=$(az acr login --name ${{ env.ACR_NAME }} --expose-token --output tsv --query accessToken) \
            --docker-email=not@used.local \
            --namespace=${{ env.AKS_NAMESPACE }} \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f .rendered/serviceaccount.yaml -n ${{ env.AKS_NAMESPACE }}
          kubectl apply -f .rendered/secretproviderclass.yaml -n ${{ env.AKS_NAMESPACE }}
          kubectl apply -f k8s/configmap.yaml -n ${{ env.AKS_NAMESPACE }}

          # Apply data layer components
          kubectl apply -f k8s/mssql-secret.yaml -n ${{ env.AKS_NAMESPACE }}
          kubectl apply -f k8s/mssql-pvc.yaml -n ${{ env.AKS_NAMESPACE }}
          kubectl apply -f k8s/mssql-deployment.yaml -n ${{ env.AKS_NAMESPACE }}
          kubectl apply -f k8s/mssql-service.yaml -n ${{ env.AKS_NAMESPACE }}

          # Apply API deployment and ingress
          kubectl apply -f k8s/deployment.yaml -n ${{ env.AKS_NAMESPACE }}
          kubectl apply -f k8s/service.yaml -n ${{ env.AKS_NAMESPACE }}
          kubectl apply -f k8s/ingress.yaml -n ${{ env.AKS_NAMESPACE }}

      - name: Update deployment image
        run: |
          kubectl set image deployment/catalog-api \
            catalog-api=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --namespace=${{ env.AKS_NAMESPACE }}

      - name: Cleanup stuck terminating pods
        run: |
          echo "=== Force-deleting Terminating pods ==="
          for pod in $(kubectl get pods -n ${{ env.AKS_NAMESPACE }} -l app=catalog-api --no-headers | awk '/Terminating/ {print $1}'); do
            kubectl delete pod "$pod" -n ${{ env.AKS_NAMESPACE }} --force --grace-period=0 || true
          done

          echo "=== Force-deleting pods stuck in non-ready state (Error/CrashLoop/Pending) ==="
          for pod in $(kubectl get pods -n ${{ env.AKS_NAMESPACE }} -l app=catalog-api --no-headers | awk '/Error|CrashLoopBackOff|ErrImagePull|ImagePullBackOff|OOMKilled|Init:Error|ContainerCannotRun/ {print $1}'); do
            kubectl delete pod "$pod" -n ${{ env.AKS_NAMESPACE }} --force --grace-period=0 || true
          done

      - name: Debug deployment status before wait
        run: |
          echo "=== SecretProviderClass status ==="
          kubectl get secretproviderclass -n ${{ env.AKS_NAMESPACE }} -o wide || true

          echo "=== Checking synchronized secret ==="
          kubectl get secret catalog-api-secret -n ${{ env.AKS_NAMESPACE }} || echo "Secret not synchronized yet"

          echo "=== Pod list ==="
          kubectl get pods -n ${{ env.AKS_NAMESPACE }} -l app=catalog-api -o wide

          echo "=== Pod describe (events + mounts) ==="
          kubectl describe pods -n ${{ env.AKS_NAMESPACE }} -l app=catalog-api | grep -A 20 'Events:' || true

          echo "=== Pod logs (last 30 lines each) ==="
          for pod in $(kubectl get pods -n ${{ env.AKS_NAMESPACE }} -l app=catalog-api --no-headers | awk '{print $1}'); do
            echo "--- Logs for pod: $pod ---"
            kubectl logs "$pod" -n ${{ env.AKS_NAMESPACE }} --tail=30 --previous 2>/dev/null || \
            kubectl logs "$pod" -n ${{ env.AKS_NAMESPACE }} --tail=30 2>/dev/null || echo "(no logs available)"
          done

          echo "=== Waiting 20 seconds for pod initialization ==="
          sleep 20

      - name: Wait for deployment to be ready
        run: |
          kubectl rollout status deployment/catalog-api \
            --namespace=${{ env.AKS_NAMESPACE }} \
            --timeout=15m

      - name: Display pod logs during deployment
        if: failure()
        run: |
          echo "=== Real-time pod logs ==="
          kubectl logs -n ${{ env.AKS_NAMESPACE }} -l app=catalog-api --all-containers=true --timestamps=true --tail=100 || true

          echo "=== Pod status ==="
          kubectl get pods -n ${{ env.AKS_NAMESPACE }} -l app=catalog-api -o wide

      - name: Get deployment status
        run: |
          kubectl get deployment catalog-api -n ${{ env.AKS_NAMESPACE }} -o wide
          kubectl get pods -n ${{ env.AKS_NAMESPACE }} -l app=catalog-api
          kubectl describe pod -n ${{ env.AKS_NAMESPACE }} -l app=catalog-api | head -50

      - name: Test API health endpoint
        run: |
          kubectl port-forward -n ${{ env.AKS_NAMESPACE }} svc/catalog-api 5063:5063 &
          sleep 5
          curl -s http://localhost:5063/health || echo "Health endpoint not yet available (expected during warming up)"
        continue-on-error: true

      - name: Display logs on failure
        if: failure()
        run: |
          echo "=== Deployment ==="
          kubectl get deployment catalog-api -n ${{ env.AKS_NAMESPACE }} -o wide
          echo "=== Pods ==="
          kubectl get pods -n ${{ env.AKS_NAMESPACE }} -l app=catalog-api -o wide
          echo "=== Recent Events ==="
          kubectl get events -n ${{ env.AKS_NAMESPACE }} --sort-by=.lastTimestamp | tail -50
          echo "=== Pod Logs ==="
          kubectl logs -n ${{ env.AKS_NAMESPACE }} -l app=catalog-api --tail=50 || true
          echo "=== Pod Events ==="
          kubectl describe pods -n ${{ env.AKS_NAMESPACE }} -l app=catalog-api || true

  notify:
    name: Notify Deployment Status
    needs: [build-and-test, build-and-push, deploy]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Check deployment status
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "Deployment succeeded"
          else
            echo "Deployment failed"
          fi
